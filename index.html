<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@𝐻𝐴𝑇𝐴𝐵𝐴 𝐵𝑈𝑅𝐺𝐸𝑅  | حطبة برجر</title>
    
    <!-- خطوط متميزة تناسب شخصية "نكهة حطب" الجريئة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    
    <style>
        :root {
            --bg-body: #e5e5e7;          
            --text-main: #080707;        /* أسود داكن صريح لضمان الوضوح فوق الشفافية */
            --text-sub: #222222;         /* رمادي غامق جداً للنصوص الفرعية */
            --border-color: #121212;     /* حدود سوداء واضحة مستوحاة من خط اللوجو */
            --transition-main: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *{ margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Montserrat', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow-x: hidden;
            position: relative;
            padding: 40px 16px;
        }

        /* صورة الخلفية واضحة تماماً وبأعلى دقة خلف المربع */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('IMG_1879.JPG') center/cover no-repeat;
            opacity: 0.95; /* توضيح الخلفية بشكل شبه كامل */
            filter: grayscale(100%) contrast(1.1); 
            z-index: 0;
            pointer-events: none;
        }

        /* ── المربع الأبيض الشفاف جداً (Super Transparent) ── */
        .page-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            padding: 45px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* خلفية بيضاء فائقة الشفافية مع تأثير زجاجي ناعم */
            background: rgba(233, 229, 229, 0.25); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            border: 2px solid var(--border-color);
            border-radius: 32px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        /* ── شعار اللهب الجريء ── */
        .avatar-wrap {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
            background: #121212; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .avatar-wrap .fire-icon {
            color: #ffffff;
            font-size: 2.3rem;
        }

        /* ── النصوص ── */
        .name {
            font-size: 23px;
            font-weight: 900;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6); /* ظل خفيف خلف النص لزيادة الوضوح */
        }
        .bio {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-sub);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 26px;
            max-width: 320px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }

        /* ── شبكات التواصل الاجتماعي ── */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 30px;
        }
        .social-bar a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgb(255, 252, 252); /* خلفية شبه شفافة للأزرار */
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition-main);
            backdrop-filter: blur(4px);
        }
        .social-bar a:hover {
            transform: translateY(-4px);
            background: var(--text-main);
            color: #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        /* ── الأزرار الاحترافية الشفافة ── */
        .links-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px; 
            border: 2px solid var(--border-color);
            background: rgb(255, 255, 255); /* أزرار شفافة مريحة للعين */
            color: var(--text-main);
            font-size: 15px;
            font-weight: 800; 
            text-decoration: none;
            transition: var(--transition-main);
            position: relative;
            backdrop-filter: blur(4px);
        }
        .btn:hover {
            background: var(--text-main);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
        }

        .btn .ico {
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* زر قائمة الطعام المميز بالأسود بالكامل لكي يبرز بوضوح */
        .btn.primary {
            background: var(--text-main);
            color: #ffffff;
            border: 2px solid var(--border-color);
        }
        .btn.primary:hover {
            background: #afafaf;
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* ── حركات دخول العناصر عند الفتح ── */
        @keyframes fadeInRise {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ani { opacity: 0; animation: fadeInRise 0.6s ease-out forwards; }

        /* ── كود الـ QR ── */
        .qr-widget {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 20;
        }
        .qr-card {
            width: 70px; height: 70px;
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: var(--transition-main);
        }
        .qr-card:hover {
            transform: scale(1.1) translateY(-4px);
        }
        .qr-card img {
            width: 100%; height: 100%;
            border-radius: 8px;
            display: block;
        }
        .qr-text {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
        }

        /* ── الفوتر ── */
        .footer {
            margin-top: 40px;
            text-align: center;
        }
        .footer span {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* إخفاء السكرول بار */
        ::-webkit-scrollbar { width: 0; display: none; }
        html { scrollbar-width: none; }

        /* ── الهواتف ── */
        @media(max-width:480px){
            body { padding: 20px 12px; }
            .page-container { padding: 35px 18px; border-radius: 28px; }
            .avatar-wrap { width: 80px; height: 80px; border-radius: 18px; }
            .name { font-size: 20px; }
            .bio { font-size: 12.5px; }
            .btn { font-size: 14px; padding: 14px 18px; }
            .qr-widget { display: none; } 
        }


        .avatar-wrap {
    width: 90px;

.avatar-wrap .logo-img {

        /* ── الكمبيوتر ── */
        @media(min-width:769px){

                left: 25px;
                display: flex;
                align-items: center;
                gap: 8px;
                z-index: 20;
            }
            .desktop-label span {
                font-size: 11px;
                font-weight: 800;
                color: #222;
            }
        }
        @media(max-width:768px){ .desktop-label { display: none; } }
    </style>
