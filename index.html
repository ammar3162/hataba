<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@ provide 𝐻𝐴𝑇𝐴𝐵𝐴 𝐵𝑈𝑅𝐺𝐸𝑅 | حطبة برجر</title>
    
    <!-- خطوط متميزة تناسب نكهة حطب الجريئة والفاخرة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    
    <style>
        :root {
            --bg-body: #0a0a0a;          /* خلفية سوداء داكنة جداً */
            --text-main: #ffffff;        /* أبيض ناصع للعناوين الرئيسية */
            --text-sub: #b0b0b0;         /* رمادي فاتح أنيق جداً للنصوص الفرعية */
            --border-color: rgba(255, 255, 255, 0.15); /* حدود بيضاء شفافة وناعمة */
            --card-bg: rgba(0, 0, 0, 0.55); /* أسود شفاف جداً بمظهر زجاجي فاخر */
            --transition-main: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        *{ margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Montserrat', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow-x: hidden;
            position: relative;
            padding: 40px 16px;
        }

        /* صورة الخلفية مدمجة بشكل داكن مائل للأبيض والأسود */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('IMG_1879.JPG') center/cover no-repeat;
            opacity: 0.25; /* خفضنا الإضاءة لتناسب ثيم الأبيض والأسود */
            filter: grayscale(100%) contrast(1.2); /* تحويل الخلفية لأبيض وأسود بالكامل */
            z-index: 0;
            pointer-events: none;
        }

        /* ── الحاوية الرئيسية الشفافة ── */
        .page-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(124, 124, 124, 0.65); /* أرضية سوداء شفافة تعزل المحتوى بوضوح */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(225, 225, 225, 0.08);
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(35, 35, 35, 0.8);
        }

        /* ── تنسيق مربع الشعار ── */
        .avatar-wrap {
            width: 95px;
            height: 95px;
            border-radius: 50%; /* دائري ناعم وفخم */
            border: 2px solid var(--text-main); /* إطار أبيض ناصع حول اللوجو */
            margin-bottom: 22px;
            background: #121212; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .avatar-wrap .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── النصوص ── */
        .name {
            font-size: 21px;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .bio {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub); /* رمادي أنيق */
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 28px;
            max-width: 320px;
        }

        /* ── شبكات التواصل الاجتماعي ── */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .social-bar a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition-main);
        }
        .social-bar a:hover {
            transform: translateY(-4px);
            background: var(--text-main);
            color: #121212;
            border-color: var(--text-main);
        }

        /* ── تصميم البطاقات الفاخرة باللون الأسود والأبيض ── */
        .links-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 24px;
            border-radius: 20px; /* زوايا منحنية ناعمة */
            border: 1px solid var(--border-color);
            background: var(--card-bg); /* أسود شفاف جداً */
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition-main);
            position: relative;
            box-shadow: 0 4px 15px rgba(198, 197, 197, 0.816);
        }
        
        /* تأثير التمرير (Hover) */
        .btn:hover {
            background: rgba(227, 227, 227, 0.618); /* تأثير إضاءة خفيفة عند الوقوف على الزر */
            border-color: var(--text-main);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(144, 138, 138, 0.1);
        }

        /* حاوية النصوص داخل البطاقة */
        .btn-text-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            flex-grow: 1;
        }

        .btn-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-subtitle {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-sub); /* رمادي هادئ للنص الفرعي */
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* دائرة الأيقونة (تصميم أسود وأبيض فاخر) */
        .btn .ico-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--text-sub);
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            transition: var(--transition-main);
            margin-right: 12px;
        }

        .btn:hover .ico-wrap {
            background: var(--text-main);
            color: #0a0a0a;
            border-color: var(--text-main);
        }

        /* ── حركات دخول العناصر عند الفتح ── */
        @keyframes fadeInRise {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ani { opacity: 0; animation: fadeInRise 0.6s ease-out forwards; }

        /* ── الفوتر ── */
        .footer {
            margin-top: 40px;
            text-align: center;
        }
        .footer span {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        /* إخفاء السكرول بار */
        ::-webkit-scrollbar { width: 0; display: none; }
        html { scrollbar-width: none; }

        /* ── الهواتف ── */
        @media(max-width:480px){
            body { padding: 20px 12px; }
            .page-container { padding: 35px 16px; border-radius: 28px; }
            .avatar-wrap { width: 85px; height: 85px; }
            .name { font-size: 19px; }
            .btn { padding: 16px 20px; }
            .btn-title { font-size: 14px; }
            .btn-subtitle { font-size: 9.5px; }
            .btn .ico-wrap { width: 38px; height: 38px; }
        }
    </style>
</head>
